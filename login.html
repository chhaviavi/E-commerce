 <script>
   function checkValidate(){
    let name= document.getElementById("name").value;
    let pass= document.getElementById("pass").value;
     
    if(name===""){
        alert("Name can't be empty");
        return false;
    }
    if(pass.length<6){
        alert("Password must be atleast 6 characters");
        return false;
